name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gdal-bin libgdal-dev python3-gdal \
            libgeos-dev libproj-dev
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[analysis,network,web]"
          pip install -r web/backend/requirements.txt
          pip install pytest pytest-anyio httpx
      - name: Run backend tests
        run: pytest web/backend/tests/ -v

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/frontend/package-lock.json
      - name: Install dependencies
        working-directory: web/frontend
        run: npm ci
      - name: Type check
        working-directory: web/frontend
        run: npx vue-tsc --noEmit
      - name: Run unit tests
        working-directory: web/frontend
        run: npm run test
      - name: Build
        working-directory: web/frontend
        run: npx vite build

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: web/backend/Dockerfile
          push: false
          tags: geopipe-agent-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: web/frontend/Dockerfile
          push: false
          tags: geopipe-agent-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
